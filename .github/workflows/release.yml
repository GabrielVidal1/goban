name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: npm ci
        working-directory: ui
      - run: npm run build
        working-directory: ui
      - uses: actions/upload-artifact@v4
        with:
          name: ui-dist
          path: ui/dist/

  build-binaries:
    needs: build-ui
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64
            ext: .exe

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - uses: actions/download-artifact@v4
        with:
          name: ui-dist
          path: ui/dist/
      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w" -o kanban-ui${{ matrix.ext }} .
      - name: Package
        run: |
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip kanban-ui-${{ matrix.suffix }}.zip kanban-ui${{ matrix.ext }}
          else
            tar czf kanban-ui-${{ matrix.suffix }}.tar.gz kanban-ui${{ matrix.ext || '' }}
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: kanban-ui-${{ matrix.suffix }}
          path: kanban-ui-${{ matrix.suffix }}.*

  release:
    needs: build-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: kanban-ui-*
          merge-multiple: true
          path: dist/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
