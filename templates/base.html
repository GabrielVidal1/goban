<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Board</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    {{block "header" .}}
    <header class="app-header">
        <div class="container header-content">
            <h1 class="logo">Kanban Board</h1>
            <nav class="project-nav">
                {{range $p := .AllProjects}}
                <a href="/project/{{$p}}" class="nav-link{{if eq $.CurrentProject $p}} active{{end}}">{{$p}}</a>
                {{else}}
                <span class="no-projects">No projects</span>
                {{end}}
            </nav>
            <div class="header-actions">
                <button class="btn btn-primary" hx-get="/ticket/new/form?project={{.CurrentProject}}" hx-target="#modal-content" hx-swap="innerHTML" hx-on::after-request="openModal()">+ New Ticket</button>
            </div>
        </div>
    </header>
    {{end}}

    <main class="container">
        {{block "body" .}}{{end}}
    </main>

    <!-- Modal -->
    <div id="modal-overlay" class="modal-overlay" onclick="closeModal()">
        <div id="modal" class="modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h2 id="modal-title"></h2>
                <button class="btn-close" onclick="closeModal()">&times;</button>
            </div>
            <div id="modal-content"></div>
        </div>
    </div>

    <!-- Toast container -->
    <div id="toast-container" class="toast-container"></div>

    <script>
        function openModal(title, content) {
            document.getElementById('modal-overlay').classList.add('active');
            if (title) document.getElementById('modal-title').textContent = title;
            if (content) document.getElementById('modal-content').innerHTML = content;
        }

        function closeModal() {
            document.getElementById('modal-overlay').classList.remove('active');
        }

        // HTMX events for modals and toasts
        document.body.addEventListener('htmx:afterRequest', function(evt) {
            const toast = evt.detail.xhr.getResponseHeader('X-Toast');
            if (toast) showToast(toast);
        });

        function showToast(message, type) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast ' + (type || 'info');
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Keyboard shortcut: Escape to close modal
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeModal();
        });
    </script>
</body>
</html>
