<div class="move-ticket-form">
    <h3>Move "{{.Ticket.Title}}"</h3>
    
    <form hx-post="/ticket/move/" hx-target="#modal-content" hx-swap="innerHTML">
        <input type="hidden" name="project" value="{{.Project}}">
        <input type="hidden" name="slug" value="{{.Ticket.Slug}}">

        <div class="form-group">
            <label for="target_column">Move to column</label>
            <select id="target_column" name="target_column" required>
                {{range $c := .Columns}}
                {{if ne $c .Ticket.Column}}
                <option value="{{$c}}">{{$c}}</option>
                {{end}}
                {{else}}
                <option value="">No other columns</option>
                {{end}}
            </select>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Move Ticket</button>
            <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        </div>
    </form>
</div>
