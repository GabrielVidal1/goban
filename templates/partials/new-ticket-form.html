<form hx-post="/ticket/create" hx-target="#modal-content" hx-swap="innerHTML">
    <input type="hidden" name="project" value="{{.Project}}">
    
    <div class="form-group">
        <label for="column">Column</label>
        <select id="column" name="column" required>
            {{range $c := .Columns}}
            <option value="{{$c}}">{{$c}}</option>
            {{else}}
            <option value="Backlog">Backlog</option>
            {{end}}
        </select>
    </div>

    <div class="form-group">
        <label for="title">Title *</label>
        <input type="text" id="title" name="title" required placeholder="Ticket title...">
    </div>

    <div class="form-row">
        <div class="form-group">
            <label for="priority">Priority</label>
            <select id="priority" name="priority">
                <option value="">None</option>
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
                <option value="critical">Critical</option>
            </select>
        </div>

        <div class="form-group">
            <label for="assignee">Assignee</label>
            <input type="text" id="assignee" name="assignee" placeholder="@username">
        </div>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label for="due">Due Date</label>
            <input type="date" id="due" name="due">
        </div>

        <div class="form-group">
            <label for="tags">Tags</label>
            <input type="text" id="tags" name="tags" placeholder="bug, feature (comma-separated)">
        </div>
    </div>

    <div class="form-group">
        <label for="body">Description</label>
        <textarea id="body" name="body" rows="4" placeholder="Describe the ticket..."></textarea>
    </div>

    <div class="form-actions">
        <button type="submit" class="btn btn-primary">Create Ticket</button>
        <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
    </div>
</form>
